<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEURAL RUST</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #050407;
      user-select: none;
      -webkit-user-select: none;
    }

    #game-container {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    canvas {
      display: block;
      position: absolute;
      top: 0; left: 0;
    }

    /* ── 시작 오버레이 ──────────────────────────────────────── */
    #fs-overlay {
      position: fixed;
      inset: 0;
      background: #050407;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      cursor: pointer;
      transition: opacity 0.5s ease;
      overflow: hidden;
    }

    #fs-overlay::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(180, 100, 30, 0.018) 2px,
          rgba(180, 100, 30, 0.018) 4px
        );
      pointer-events: none;
      z-index: 0;
    }

    #fs-overlay::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: min(600px, 80vw);
      height: min(600px, 80vw);
      background: radial-gradient(
        ellipse at center,
        rgba(160, 80, 20, 0.06) 0%,
        rgba(80, 30, 10, 0.03) 40%,
        transparent 70%
      );
      pointer-events: none;
      z-index: 0;
      animation: glowPulse 4s ease-in-out infinite;
    }

    @keyframes glowPulse {
      0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
      50%       { opacity: 1;   transform: translate(-50%, -50%) scale(1.08); }
    }

    .overlay-content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .deco-top {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
      opacity: 0;
      animation: fadeUp 1s ease 0.3s forwards;
    }
    .deco-line {
      width: clamp(40px, 6vw, 80px);
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(160, 90, 30, 0.5), transparent);
    }
    .deco-dot {
      width: 3px;
      height: 3px;
      background: rgba(160, 90, 30, 0.6);
      border-radius: 50%;
    }
    .deco-text {
      color: rgba(160, 90, 30, 0.5);
      font-family: 'BMKiranghaerang', 'NeoDunggeunmoPro', monospace;
      font-size: clamp(9px, 1vw, 11px);
      letter-spacing: 5px;
    }

    .title-wrap {
      position: relative;
      opacity: 0;
      animation: fadeUp 1.2s ease 0.5s forwards;
      transform-origin: center center;
    }

    .title-main {
      color: #c8bfb0;
      font-family: 'BMKiranghaerang', 'NeoDunggeunmoPro', monospace;
      font-size: clamp(32px, 7vw, 72px);
      letter-spacing: clamp(6px, 1.5vw, 18px);
      position: relative;
      display: inline-block;

      transform: scaleX(0.75) scaleY(1.30);
      transform-origin: center center;

      text-shadow:
        0 0  0px #2a1408,
        0 0  6px rgba(160, 80, 20, 0.55),
        0 0 18px rgba(130, 60, 10, 0.35),
        0 0 40px rgba(100, 40,  8, 0.20),
        0 0 70px rgba( 80, 30,  5, 0.10);

      -webkit-text-stroke: 1.5px #5a3010;
    }

    .title-main::before,
    .title-main::after {
      content: attr(data-text);
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      opacity: 0;
    }

    .title-main::before {
      color: rgba(200, 80, 30, 0.5);
      animation: glitch1 4.8s infinite 0.8s;
      clip-path: polygon(0 20%, 100% 20%, 100% 40%, 0 40%);
    }
    .title-main::after {
      color: rgba(30, 80, 160, 0.3);
      animation: glitch2 4.8s infinite 0.8s;
      clip-path: polygon(0 60%, 100% 60%, 100% 75%, 0 75%);
    }

    @keyframes glitch1 {
      0%, 90%, 100% { opacity: 0; transform: translateX(0); }
      92%           { opacity: 1; transform: translateX(-3px); }
      94%           { opacity: 1; transform: translateX(3px); }
      96%           { opacity: 0; }
    }
    @keyframes glitch2 {
      0%, 88%, 100% { opacity: 0; transform: translateX(0); }
      90%           { opacity: 1; transform: translateX(4px); }
      93%           { opacity: 0; }
    }

    .title-sub-ko {
      color: rgba(150, 110, 70, 0.55);
      font-family: 'BMKiranghaerang', 'NeoDunggeunmoPro', monospace;
      font-size: clamp(11px, 1.4vw, 16px);
      letter-spacing: clamp(4px, 1vw, 10px);
      text-align: center;
      margin-top: 18px;
      opacity: 0;
      animation: fadeUp 1s ease 0.9s forwards;
    }

    .divider {
      width: clamp(120px, 20vw, 240px);
      height: 1px;
      margin: 28px auto 24px;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(120, 70, 20, 0.3) 30%,
        rgba(180, 100, 30, 0.5) 50%,
        rgba(120, 70, 20, 0.3) 70%,
        transparent 100%
      );
      opacity: 0;
      animation: fadeIn 1s ease 1.1s forwards;
    }

    #fs-overlay .hint {
      font-family: 'BMKiranghaerang', 'NeoDunggeunmoPro', monospace;
      font-size: clamp(10px, 1.1vw, 13px);
      color: rgba(130, 90, 50, 0.7);
      letter-spacing: 3px;
      opacity: 0;
      animation: fadeIn 1s ease 1.4s forwards, blinkHint 2s ease-in-out 2.4s infinite;
    }

    .overlay-footer {
      position: absolute;
      bottom: 24px;
      left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      padding: 0 clamp(16px, 3vw, 40px);
      z-index: 1;
      opacity: 0;
      animation: fadeIn 1s ease 1.6s forwards;
    }
    .overlay-footer span {
      font-family: 'BMKiranghaerang', 'NeoDunggeunmoPro', monospace;
      font-size: clamp(8px, 0.9vw, 11px);
      color: rgba(80, 60, 40, 0.5);
      letter-spacing: 2px;
    }

    .corner {
      position: absolute;
      width: 20px; height: 20px;
      z-index: 1;
      opacity: 0;
      animation: fadeIn 1.5s ease 0.8s forwards;
    }
    .corner::before, .corner::after {
      content: '';
      position: absolute;
      background: rgba(160, 90, 30, 0.35);
    }
    .corner::before { width: 100%; height: 1px; }
    .corner::after  { width: 1px; height: 100%; }

    .corner-tl { top: clamp(16px, 3vw, 32px); left: clamp(16px, 3vw, 32px); }
    .corner-tr { top: clamp(16px, 3vw, 32px); right: clamp(16px, 3vw, 32px); }
    .corner-bl { bottom: clamp(16px, 3vw, 32px); left: clamp(16px, 3vw, 32px); }
    .corner-br { bottom: clamp(16px, 3vw, 32px); right: clamp(16px, 3vw, 32px); }

    .corner-tr::before { right: 0; }
    .corner-tr::after  { right: 0; }
    .corner-bl::before { bottom: 0; }
    .corner-bl::after  { bottom: 0; }
    .corner-br::before { right: 0; bottom: 0; }
    .corner-br::after  { right: 0; bottom: 0; }

    .side-text {
      position: absolute;
      top: 50%;
      transform: translateY(-50%) rotate(-90deg);
      font-family: 'BMKiranghaerang', 'NeoDunggeunmoPro', monospace;
      font-size: clamp(8px, 0.85vw, 10px);
      color: rgba(100, 70, 40, 0.3);
      letter-spacing: 4px;
      z-index: 1;
      opacity: 0;
      animation: fadeIn 1s ease 1.8s forwards;
      white-space: nowrap;
    }
    .side-text-l { left: clamp(12px, 2vw, 24px); }
    .side-text-r { right: clamp(12px, 2vw, 24px); transform: translateY(-50%) rotate(90deg); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes blinkHint {
      0%, 100% { opacity: 0.7; }
      50%       { opacity: 0.2; }
    }

    body.ingame { cursor: default; }
  </style>

  <!-- 폰트 -->
  <style>
    @font-face {
      font-family: 'BMKiranghaerang';
      src: url('Games/Assets/Fonts/BMKIRANGHAERANG.woff2') format('woff2');

    }
    @font-face {

      font-weight: normal;
      font-style: normal;
      font-display: block;
    }
  </style>
</head>
